<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Meghívó</title>
  <style>
    :root {
      --page-w: 105mm;
      --page-h: 148mm;
      --dur: 1.1s;
      --ease: cubic-bezier(.645, .045, .355, 1);
      --radius: 10px;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f0ece9;
      font-family: 'Georgia', serif;
      overflow: hidden;
      touch-action: none; /* Megakadályozza az alapértelmezett görgetést swipe közben */
    }

    .viewport {
      width: var(--page-w);
      height: var(--page-h);
      perspective: 2500px;
      position: relative;
    }

    .book-wrap {
      position: absolute;
      width: calc(var(--page-w) * 2);
      height: 100%;
      left: 0;
      display: flex;
      transition: transform var(--dur) --ease;
      transform-style: preserve-3d;
    }

    /* Pozíciók */
    .state-0 .book-wrap { transform: translateX(calc(var(--page-w) * -1)); }
    .state-1 .book-wrap { transform: translateX(0); }
    .state-2 .book-wrap { transform: translateX(calc(var(--page-w) * -1)); }
    .state-3 .book-wrap { transform: translateX(0); }

    .leaf {
      position: absolute;
      width: var(--page-w);
      height: 100%;
      transform-style: preserve-3d;
      transition: transform var(--dur) var(--ease), z-index 0.3s;
      border-radius: var(--radius);
    }

    #leaf-cover { left: var(--page-w); transform-origin: left center; z-index: 10; }
    #leaf-back { left: var(--page-w); transform-origin: left center; z-index: 5; }

    #leaf-cover.flipped { transform: rotateY(-180deg); z-index: 8; }
    .state-3 #leaf-cover { z-index: 1 !important; }
    #leaf-back.flipped { transform: rotateY(-180deg); z-index: 15; }

    .face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: var(--radius);
      background: white;
      box-shadow: 0 5px 25px rgba(0,0,0,0.1);
    }

    .back { transform: rotateY(180deg); }
    img { width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius); pointer-events: none; }

    /* Navigációs segédlet (opcionális, halvány pöttyök alul) */
    .nav-dots {
      position: fixed;
      bottom: 30px;
      display: flex;
      gap: 10px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
      transition: background 0.3s;
    }
    .dot.active { background: #a57662; }
  </style>
</head>
<body class="state-0" onclick="handleClick(event)">

  <div class="viewport">
    <div class="book-wrap" id="bookContainer">
      <div class="leaf" style="left:0; opacity:0; pointer-events:none;"></div>
      <div class="leaf" id="leaf-back">
        <div class="face front"><img src="3.png"></div>
        <div class="face back"><img src="4.png"></div>
      </div>
      <div class="leaf" id="leaf-cover">
        <div class="face front"><img src="1.png"></div>
        <div class="face back"><img src="2.png"></div>
      </div>
    </div>
  </div>

  <div class="nav-dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <script>
    let state = 0;
    const body = document.body;
    const cover = document.getElementById('leaf-cover');
    const backLeaf = document.getElementById('leaf-back');
    const dots = document.querySelectorAll('.dot');

    function move(dir) {
      const newState = state + dir;
      if (newState < 0 || newState > 3) return;
      state = newState;

      cover.classList.toggle('flipped', state >= 1);
      backLeaf.classList.toggle('flipped', state >= 3);
      body.className = 'state-' + state;

      dots.forEach((dot, idx) => dot.classList.toggle('active', idx === state));
    }

    // Kattintás alapú lapozás (bal oldal vissza, jobb oldal előre)
    function handleClick(e) {
      if (e.clientX > window.innerWidth / 2) {
        move(1);
      } else {
        move(-1);
      }
    }

    // Swipe kezelés
    let touchStartX = 0;
    let touchEndX = 0;

    document.addEventListener('touchstart', e => {
      touchStartX = e.changedTouches[0].screenX;
    }, false);

    document.addEventListener('touchend', e => {
      touchEndX = e.changedTouches[0].screenX;
      handleSwipe();
    }, false);

    function handleSwipe() {
      const swipeDistance = touchEndX - touchStartX;
      if (swipeDistance < -50) move(1);  // Balra húzás -> Következő
      if (swipeDistance > 50) move(-1);  // Jobbra húzás -> Előző
    }

    // Billentyűzet
    document.addEventListener('keydown', (e) => {
      if (e.key === "ArrowRight") move(1);
      if (e.key === "ArrowLeft") move(-1);
    });
  </script>
</body>
</html>
