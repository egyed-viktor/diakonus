<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Meghívó</title>
  <style>
    :root {
      --page-w: 80vw;
      --page-h: 115vw;
      --max-w: 340px;
      --max-h: 480px;
      --dur: 1.1s;
      --ease: cubic-bezier(.645, .045, .355, 1);
      --radius: 12px;
    }

    @media (min-width: 600px) {
      :root { --page-w: var(--max-w); --page-h: var(--max-h); }
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 40px;
      background: #f0ece9;
      overflow: hidden;
      touch-action: none;
    }

    .viewport {
      width: var(--page-w);
      height: var(--page-h);
      perspective: 2500px;
    }

    .book-wrap {
      position: absolute;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform var(--dur) var(--ease);
      transform-origin: left center;
    }

    .state-0 .book-wrap { transform: translateX(0); }
    .state-1 .book-wrap { transform: translateX(100%); }
    .state-2 .book-wrap { transform: translateX(0); }
    .state-3 .book-wrap { transform: translateX(100%); }
    .moving-to-back .book-wrap { transform: translateX(50%); }

    .leaf {
      position: absolute;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform var(--dur) var(--ease), z-index 0.3s;
      border-radius: var(--radius);
      transform-origin: left center;
    }

    #leaf-cover { z-index: 10; }
    #leaf-back { z-index: 5; }

    #leaf-cover.flipped { transform: rotateY(-180deg); z-index: 4; }
    #leaf-back.flipped { transform: rotateY(-180deg); z-index: 15; }

    .moving-to-back #leaf-back { z-index: 20; } 

    .face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: var(--radius);
      background: white;
      box-shadow: 0 5px 25px rgba(0,0,0,0.15);
      transform: translateZ(0);
    }

    .back { transform: rotateY(180deg); }
    img { width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius); pointer-events: none; }

    .hide-cover #leaf-cover { visibility: hidden; }

    .nav-dots {
      position: fixed; bottom: 40px; display: flex; gap: 10px; left: 50%; transform: translateX(-50%);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
    .dot.active { background: #a57662; }
  </style>
</head>
<body class="state-0" onclick="handleClick(event)">

  <div class="viewport">
    <div class="book-wrap">
      <div class="leaf" id="leaf-back">
        <div class="face front"><img src="3.png"></div>
        <div class="face back"><img src="4.png"></div>
      </div>
      <div class="leaf" id="leaf-cover">
        <div class="face front"><img src="1.png"></div>
        <div class="face back"><img src="2.png"></div>
      </div>
    </div>
  </div>

  <div class="nav-dots"><div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>

  <script>
    let state = 0;
    const body = document.body;
    const cover = document.getElementById('leaf-cover');
    const backLeaf = document.getElementById('leaf-back');
    const dots = document.querySelectorAll('.dot');

    function move(dir) {
      const newState = state + dir;
      if (newState < 0 || newState > 3) return;

      if (state === 2 && newState === 3) {
        body.classList.remove('hide-cover');
        body.classList.add('moving-to-back');
        backLeaf.classList.add('flipped');
        setTimeout(() => {
          body.classList.remove('moving-to-back');
          applyState(newState);
        }, 400);
        setTimeout(() => { if(state === 3) body.classList.add('hide-cover'); }, 1100);

      } else if (state === 1 && newState === 0) {
        // Speciális visszalapozás 2-ről 1-re (State 1 -> 0)
        body.classList.add('moving-to-back');
        cover.classList.remove('flipped');
        setTimeout(() => {
          body.classList.remove('moving-to-back');
          applyState(newState);
        }, 400);
      } else if (state === 3 && newState === 2) {
        body.classList.remove('hide-cover');
        applyState(newState);
      } else {
        applyState(newState);
      }
    }

    function applyState(newState) {
      state = newState;
      body.className = 'state-' + state;
      cover.classList.toggle('flipped', state >= 1);
      backLeaf.classList.toggle('flipped', state >= 3);
      
      // Időzített elrejtés a villanás ellen visszalapozáskor
      if (state === 0) {
          setTimeout(() => {
            if(state === 0) backLeaf.style.visibility = 'hidden';
          }, 1100);
      } else {
          backLeaf.style.visibility = 'visible';
      }

      dots.forEach((dot, idx) => dot.classList.toggle('active', idx === state));
    }

    applyState(0);

    function handleClick(e) {
      if (e.clientX > window.innerWidth / 2) move(1);
      else move(-1);
    }

    let touchStartX = 0;
    document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; });
    document.addEventListener('touchend', e => {
      const touchEndX = e.changedTouches[0].screenX;
      if (touchStartX - touchEndX > 50) move(1);
      if (touchStartX - touchEndX < -50) move(-1);
    });
  </script>
</body>
</html>
