<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Meghívó</title>
  <style>
    :root {
      --page-w: 85vw;   /* Egy lap szélessége mobilon */
      --page-h: 120vw;  /* Magasság */
      --max-w: 350px;   /* Max szélesség desktopon */
      --max-h: 495px;
      --dur: 1.2s;
      --ease: cubic-bezier(.645, .045, .355, 1);
      --radius: 12px;
    }

    @media (min-width: 600px) {
      :root { --page-w: var(--max-w); --page-h: var(--max-h); }
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 30px;
      background: #f0ece9;
      font-family: 'Georgia', serif;
      overflow: hidden;
      touch-action: none;
    }

    .viewport {
      width: var(--page-w);
      height: var(--page-h);
      perspective: 2500px;
      position: relative;
    }

    .book-wrap {
      position: absolute;
      width: 100%;
      height: 100%;
      left: 0;
      transform-style: preserve-3d;
      transition: transform var(--dur) var(--ease);
      transform-origin: left center;
    }

    /* --- MOZGÁS LOGIKA --- */
    
    /* 0: Borító középen */
    .state-0 .book-wrap { transform: translateX(0); }

    /* 1-2: Kinyílik, a forgástengely eltolódik, hogy a 2-3 oldal egymás mellett legyen középen */
    .state-1 .book-wrap, 
    .state-2 .book-wrap { transform: translateX(50%); }

    /* 3: Becsukódik, a hátlap (4.png) visszakerül középre */
    .state-3 .book-wrap { transform: translateX(100%); }

    .leaf {
      position: absolute;
      width: 100%;
      height: 100%;
      left: 0;
      transform-style: preserve-3d;
      transition: transform var(--dur) var(--ease), z-index 0.3s;
      border-radius: var(--radius);
      transform-origin: left center;
    }

    #leaf-cover { z-index: 10; }
    #leaf-back { z-index: 5; }

    /* LAPOZÁS */
    /* Első lap átfordul balra */
    #leaf-cover.flipped { 
      transform: rotateY(-180deg); 
      z-index: 4; 
    }

    /* Második lap rácsukódik az elsőre balra */
    #leaf-back.flipped { 
      transform: rotateY(-180deg); 
      z-index: 11; /* Legfelülre kerül a hátlap */
    }

    .face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: var(--radius);
      background: white;
      box-shadow: 0 5px 25px rgba(0,0,0,0.15);
    }

    .back { transform: rotateY(180deg); }
    img { width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius); pointer-events: none; }

    .nav-dots {
      position: fixed;
      bottom: 40px;
      display: flex;
      gap: 10px;
      left: 50%;
      transform: translateX(-50%);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #d1cbc8; transition: 0.3s; }
    .dot.active { background: #a57662; transform: scale(1.2); }
  </style>
</head>
<body class="state-0" onclick="handleClick(event)">

  <div class="viewport">
    <div class="book-wrap">
      <!-- MÁSODIK LAP (3. kép elöl, 4. kép hátul) -->
      <div class="leaf" id="leaf-back">
        <div class="face front"><img src="3.png"></div>
        <div class="face back"><img src="4.png"></div>
      </div>
      
      <!-- ELSŐ LAP (1. kép elöl, 2. kép hátul) -->
      <div class="leaf" id="leaf-cover">
        <div class="face front"><img src="1.png"></div>
        <div class="face back"><img src="2.png"></div>
      </div>
    </div>
  </div>

  <div class="nav-dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <script>
    let state = 0;
    const body = document.body;
    const cover = document.getElementById('leaf-cover');
    const backLeaf = document.getElementById('leaf-back');
    const dots = document.querySelectorAll('.dot');

    function move(dir) {
      const newState = state + dir;
      if (newState < 0 || newState > 3) return;
      state = newState;

      cover.classList.toggle('flipped', state >= 1);
      backLeaf.classList.toggle('flipped', state >= 3);
      
      body.className = 'state-' + state;
      dots.forEach((dot, idx) => dot.classList.toggle('active', idx === state));
    }

    function handleClick(e) {
      if (e.clientX > window.innerWidth / 2) move(1);
      else move(-1);
    }

    let touchStartX = 0;
    document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; });
    document.addEventListener('touchend', e => {
      const touchEndX = e.changedTouches[0].screenX;
      if (touchStartX - touchEndX > 50) move(1);
      if (touchStartX - touchEndX < -50) move(-1);
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === "ArrowRight") move(1);
      if (e.key === "ArrowLeft") move(-1);
    });
  </script>
</body>
</html>
