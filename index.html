<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Meghívó</title>
  <style>
    :root {
      --page-w: 320px; 
      --page-h: 460px; 
      --dur: 0.7s;
      --ease: cubic-bezier(.645, .045, .355, 1);
      --ornament-gold: #a57662; 
      --dark-bg: #3c2a1e;
    }

    @media (min-width: 500px) { :root { --page-w: 380px; --page-h: 540px; } }

    body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: #f0ece9; font-family: 'Georgia', serif; overflow: hidden; touch-action: none; }

    #startOverlay { position: absolute; inset: 0; z-index: 2000; display: flex; justify-content: center; align-items: center; background: #f0ece9; }
    .btn-style { padding: 18px 36px; border: 1.5px solid var(--ornament-gold); background: var(--dark-bg); color: #f7e9d7; border-radius: 12px; cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 1.5px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); font-size: 18px; outline: none; }

    #mainContent { display: none; flex-direction: column; align-items: center; width: 100%; }
    body.active #mainContent { display: flex; }
    body.active #startOverlay { display: none; }

    .scene { width: var(--page-w); height: var(--page-h); perspective: 2000px; }
    .book { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; }
    .leaf { position: absolute; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform var(--dur) var(--ease), z-index 0.1s; transform-origin: left center; }
    .face { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 10px; box-shadow: 0 5px 25px rgba(0,0,0,0.15); background: white; }
    .back { transform: rotateY(180deg); background: #f0ece9; }
    img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; pointer-events: none; }

    .flipped { transform: rotateY(-180deg) translateX(-100%); z-index: 0 !important; }

    .controls { margin-top: 40px; display: flex; gap: 25px; align-items: center; }
    #pageNum { font-weight: bold; color: var(--dark-bg); font-size: 1.2rem; min-width: 60px; text-align: center; }
    .nav-btn { width: 55px; height: 55px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; }
    .nav-btn:disabled { opacity: 0.2; }
  </style>
</head>
<body>

  <div id="startOverlay">
    <button class="btn-style" onclick="openInvitation()">Meghívó megnyitása</button>
  </div>

  <div id="mainContent">
    <div class="scene" id="swipeZone">
      <div class="book">
        <div class="leaf" id="leaf4" style="z-index: 10;"><div class="face front"><img src="4.png"></div><div class="face back"></div></div>
        <div class="leaf" id="leaf3" style="z-index: 11;"><div class="face front"><img src="3.png"></div><div class="face back"></div></div>
        <div class="leaf" id="leaf2" style="z-index: 12;"><div class="face front"><img src="2.png"></div><div class="face back"></div></div>
        <div class="leaf" id="leaf1" style="z-index: 13;"><div class="face front"><img src="1.png"></div><div class="face back"></div></div>
      </div>
    </div>
    <div class="controls">
      <button id="prevBtn" class="btn-style nav-btn" onclick="prevPage()" disabled>←</button>
      <span id="pageNum">1 / 4</span>
      <button id="nextBtn" class="btn-style nav-btn" onclick="nextPage()">→</button>
    </div>
  </div>

  <script>
    let current = 1;
    const total = 4;

    function openInvitation() {
      document.body.classList.add('active');
      const doc = document.documentElement;
      if (doc.requestFullscreen) doc.requestFullscreen().catch(() => {});
      else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen().catch(() => {});
    }

    function updateUI() {
      document.getElementById('pageNum').textContent = `${current} / ${total}`;
      document.getElementById('prevBtn').disabled = (current === 1);
      document.getElementById('nextBtn').disabled = (current === total);
    }

    function nextPage() {
      if (current < total) {
        document.getElementById(`leaf${current}`).classList.add('flipped');
        current++;
        updateUI();
      }
    }

    function prevPage() {
      if (current > 1) {
        current--;
        document.getElementById(`leaf${current}`).classList.remove('flipped');
        updateUI();
      }
    }

    // SWIPE LOGIKA
    let touchStartX = 0;
    let touchEndX = 0;

    const zone = document.getElementById('swipeZone');

    zone.addEventListener('touchstart', e => {
      touchStartX = e.changedTouches[0].screenX;
    }, false);

    zone.addEventListener('touchend', e => {
      touchEndX = e.changedTouches[0].screenX;
      handleSwipe();
    }, false);

    function handleSwipe() {
      const swipedistance = touchStartX - touchEndX;
      if (Math.abs(swipedistance) > 50) { // minimum 50px elmozdulás
        if (swipedistance > 0) nextPage(); // Balra húzás -> Következő
        else prevPage(); // Jobbra húzás -> Előző
      }
    }

    // Kattintásra is lapozzon (mobilbarát módon)
    zone.addEventListener('click', (e) => {
      const rect = zone.getBoundingClientRect();
      const x = e.clientX - rect.left;
      if (x > rect.width / 2) nextPage();
      else prevPage();
    });

    // Nyilak PC-n
    document.addEventListener('keydown', e => {
      if (e.key === "ArrowRight") nextPage();
      if (e.key === "ArrowLeft") prevPage();
    });
  </script>
</body>
</html>
